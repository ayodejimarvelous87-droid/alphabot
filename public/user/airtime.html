<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buy Airtime - AlphaBot</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="app">


<div class="top">
<h2>📞 Buy Airtime</h2>
<div class="top-icons">
<a href="dashboard.html" class="back-icon">←</a>
<button id="themeToggle" class="icon-btn">🌙</button>
</div>
</div>




<div class="wallet-card">

<p>
Instant airtime recharge
</p>

<h2>
Choose Network
</h2>

</div>





<div class="card">


<div class="input-group">
<label>📡 Select Network</label>
<select id="network">
<option value="">Select Network</option>
<option value="MTN">MTN</option>
<option value="Airtel">Airtel</option>
<option value="Glo">Glo</option>
<option value="9mobile">9mobile</option>
</select>
</div>

<div class="input-group">
<label>👥 Saved Beneficiary</label>
<select id="beneficiarySelect">
<option value="">Select saved number</option>
</select>
</div>

<div class="input-group">
<label>📱 Phone Number</label>
<input id="phone" placeholder="Enter phone number">
</div>

<div class="input-group">
<label>💰 Amount</label>
<input id="amount" placeholder="Enter amount" type="number">
</div>



<button id="buyAirtime">

Buy Airtime

</button>



<p id="message"></p>


</div>








<a class="back" href="dashboard.html">

Back to Dashboard

</a>


</div>




<script src="js/theme.js"></script>

<script src="js/airtime.js"></script>


</body>

</html>
