<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Betting Funding - AlphaBot</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="app">


<div class="top">
<h2>⚽ Betting Funding</h2>
<div class="top-icons">
<a href="dashboard.html" class="back-icon">←</a>
<button id="themeToggle" class="icon-btn">🌙</button>
</div>
</div>





<div class="wallet-card">

<p>
Fund your betting account instantly
</p>

<h2>
Safe & Fast
</h2>

</div>





<div class="card">


<div class="input-group">
<label>🎮 Select Betting Platform</label>
<select id="provider">
<option value="">Select Betting Platform</option>
<option value="Bet9ja">Bet9ja</option>
<option value="SportyBet">SportyBet</option>
<option value="1xBet">1xBet</option>
<option value="Other">Other</option>
</select>
</div>

<div class="input-group">
<label>👥 Saved Betting Accounts</label>
<select id="beneficiarySelect">
<option value="">Select saved account</option>
</select>
</div>

<div class="input-group">
<label>📱 Phone Number</label>
<input id="phoneNumber" placeholder="Enter phone number">
</div>

<div class="input-group">
<label>💰 Amount</label>
<input id="amount" placeholder="Enter amount" type="number">
</div>

<div class="input-group">
<label>🔐 Transaction PIN</label>
<input id="pin" type="password" maxlength="4" placeholder="Enter 4-digit PIN">
</div>

<button id="fundBetting">

Fund Account

</button>




<p id="message"></p>


</div>








<a class="back" href="dashboard.html">

Back to Dashboard

</a>


</div>




<script src="js/theme.js"></script>

<script src="js/betting.js"></script>


</body>

</html>
