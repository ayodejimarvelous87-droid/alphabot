<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fund Wallet - AlphaBot</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="app">


<div class="top">
<h2>💰 Fund Wallet</h2>
<div class="top-icons">
<a href="dashboard.html" class="back-icon">←</a>
<button id="themeToggle" class="icon-btn">🌙</button>
</div>
</div>




<div class="wallet-card">

<p>
Transfer money to AlphaBot account
</p>


<h2>
Fast & Secure Funding
</h2>

</div>





<div class="card">


<h3>
Bank Transfer Details
</h3>


<p>
Bank: Your Bank Name
</p>


<p>
Account Number: XXXXXXXX
</p>


<p>
Account Name: AlphaBot
</p>


<br>


<p>
After completing your transfer, enter the amount below and submit.
</p>




<div class="input-group">
<label>📱 Phone Number</label>
<input id="phone" placeholder="Enter phone number">
</div>

<div class="input-group">
<label>💰 Amount Transferred</label>
<input id="amount" placeholder="Enter amount">
</div>

<button id="fund">
Submit Funding Request
</button>

<p id="message"></p>

</div>


<a class="back" href="dashboard.html">
Back to Dashboard
</a>

</div>

<script src="js/theme.js"></script>
<script src="js/fund.js"></script>

</body>
</html>
