<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recurring Payments - AlphaBot</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>

<div class="app">


<div class="top">
<h2>🔄 Recurring Payments</h2>

<div class="top-icons">

<a href="dashboard.html" class="back-icon">
←
</a>

<button id="themeToggle" class="icon-btn">
🌙
</button>

</div>

</div>



<div class="wallet-card">

<p>
Automate your regular payments
</p>

<h2>
Never miss a payment 🚀
</h2>

</div>




<div class="card">

<h3>Create Recurring Payment</h3>


<div class="input-group">

<label>Service</label>

<select id="service">

<option value="data">Data</option>
<option value="airtime">Airtime</option>
<option value="betting">Betting</option>

</select>

</div>



<div class="input-group">

<label>Provider</label>

<input id="provider" placeholder="MTN / SportyBet">

</div>




<div class="input-group">

<label>Amount</label>

<input id="amount" type="number" placeholder="Enter amount">

</div>



<div class="input-group">

<label>Frequency</label>

<select id="frequency">

<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="monthly">Monthly</option>

</select>

</div>



<button id="createRecurring">
Create
</button>


<p id="message"></p>


</div>





<div class="card">

<h3>
My Recurring Payments
</h3>


<div id="recurringList">

Loading...

</div>


</div>




<a class="back" href="dashboard.html">
Back to Dashboard
</a>


</div>



<script src="js/theme.js"></script>
<script src="js/recurring.js"></script>


</body>

</html>
