<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create AlphaBot Account</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="auth-app">


<div class="logo">

🔷

<h1>
AlphaBot
</h1>

<p>
Join the smart VTU community
</p>

</div>




<div class="auth-card">


<h2>
Create Account 🚀
</h2>


<p>
Start your AlphaBot journey
</p>



<input
id="name"
placeholder="👤 Full name"
>



<input
id="phone"
placeholder="📱 Phone number"
>



<input
id="email"
placeholder="📧 Email (optional)"
>



<input
id="password"
type="password"
placeholder="🔒 Password"
>



<input
id="referralCode"
placeholder="🎁 Referral code (optional)"
>



<button id="register">
Create Account
</button>



<p id="message"></p>



<a href="login.html">
Already have an account? Login
</a>


</div>


</div>



<script src="js/register.js"></script>


<script src="js/theme.js"></script>
</body>

</html>
