<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security - AlphaBot</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="app">


<div class="top">

<h2>
🔐 Security
</h2>


<a href="dashboard.html">
←
</a>


</div>




<div class="card security-card">


<h3>
Create Transaction PIN
</h3>



<input
id="pin"
placeholder="Enter 4 digit PIN"
type="password"
maxlength="4"
>




<button id="savePin">

Save PIN

</button>




<p id="message"></p>


</div>





<div class="card security-card">


<h3>
Change Transaction PIN
</h3>



<input
id="newPin"
placeholder="New PIN"
type="password"
maxlength="4"
>




<button id="changePin">

Update PIN

</button>


</div>








<a href="dashboard.html">

Back to Dashboard

</a>


</div>




<script src="js/theme.js"></script>

<script src="js/security.js"></script>


<script src="js/theme.js"></script>
</body>

</html>
