<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Subscription - AlphaBot</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="app">


<div class="top">
<h2>📺 TV Subscription</h2>
<div class="top-icons">
<a href="dashboard.html" class="back-icon">←</a>
<button id="themeToggle" class="icon-btn">🌙</button>
</div>
</div>




<div class="wallet-card">

<p>
Renew your TV subscription
</p>

<h2>
DSTV • GOtv • Startimes
</h2>

</div>





<div class="card">


<div class="input-group">
<label>📺 Select Provider</label>
<select id="provider">
<option value="">Select Provider</option>
<option value="DSTV">DSTV</option>
<option value="GOtv">GOtv</option>
<option value="Startimes">Startimes</option>
</select>
</div>

<div class="input-group">
<label>🔢 Smart Card / IUC Number</label>
<input id="smartCardNumber" placeholder="Enter Smart Card Number">
</div>

<div class="input-group">
<label>📦 Select Package</label>
<select id="package">
<option value="">Select Package</option>
<option value="Basic">Basic</option>
<option value="Standard">Standard</option>
<option value="Premium">Premium</option>
</select>
</div>

<div class="input-group">
<label>💰 Amount</label>
<input id="amount" placeholder="Enter amount" type="number">
</div>

<button id="subscribeTV">

Subscribe

</button>





<p id="message"></p>


</div>








<a class="back" href="dashboard.html">

Back to Dashboard

</a>


</div>




<script src="js/theme.js"></script>

<script src="js/tv.js"></script>


</body>

</html>
