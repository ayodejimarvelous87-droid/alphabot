<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Withdraw - AlphaBot</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">


<div class="top">

<h2>💸 Withdraw</h2>

<a href="dashboard.html">←</a>

</div>



<div class="card">


<label>Bank Name</label>

<input id="bankName" placeholder="e.g. Access Bank">



<label>Account Number</label>

<input id="accountNumber" placeholder="10 digit account number">



<label>Account Name</label>

<input id="accountName" placeholder="Account holder name">



<label>Amount</label>

<input id="amount" type="number" placeholder="Amount to withdraw">



<label>Transaction PIN</label>

<input id="pin" type="password" maxlength="4" placeholder="Enter transaction PIN">


<button id="withdraw">

Withdraw

</button>



<p id="message"></p>


</div>


<a class="back" href="dashboard.html">
Back to Dashboard
</a>


</div>


<script src="js/theme.js"></script>
<script src="js/withdraw.js"></script>

</body>

</html>
